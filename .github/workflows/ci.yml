name: CI test and lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up uv and Python 3.11 
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true
        python-version: "3.11"

    - name: Install dependencies
      run: uv sync

    
    - name: Run lint
      run: make lint

    
    - name: Test API
      run: make test
        