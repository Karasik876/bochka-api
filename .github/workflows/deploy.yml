name: Dev Deploy
on:
  push:
    branches:
      - dev

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  quality:
    uses: bochka-stock-exchange/bochka-api/.github/workflows/code-quality.yml@dev
  tests:
    uses: bochka-stock-exchange/bochka-api/.github/workflows/tests.yml@dev
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: StalinidzeCorp/ycr-push@main
        env:
          KEY_JSON: ${{secrets.KEY_JSON}}
          REGISTRY_ID: ${{secrets.REGISTRY_ID}}
          DOCKERFILE_PATH: ./docker/Dockerfile.prod
          IMAGE_NAME: bochka-api
          IMAGE_TAG: latest
