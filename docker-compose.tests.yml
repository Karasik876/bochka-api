services:
  tests_app:
    container_name: app_for_tests
    build:
      context: .
      dockerfile: docker/Dockerfile.tests
    env_file: tests.env
    depends_on:
      tests_db:
        condition: service_healthy

  tests_db:
    container_name: db_for_tests
    image: postgres:17-alpine
    env_file: tests.env
    ports:
      - "5432:5432"
    volumes:
      - ./tests_data/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "$POSTGRES_DB", "-U", "$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
