services:
  api:
    build: .
    container_name: my_app
    ports:
      - '8000:8000'
    volumes:
      - ./src:/app/src
    depends_on:
     migrator:
        condition: service_completed_successfully # ждет пока service migrator не отработает до конца с кодом 0
    env_file:         
      - ./.env

  db:
    image: postgres:16
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file:         
      - ./.env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"

  migrator:
    build: . 
    container_name: db_migrator
    env_file:         
      - ./.env
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy 

volumes:
  pgdata: